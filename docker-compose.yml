version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: passport-extractor-backend
    ports:
      - "5000:5000"
    env_file:
      - backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        # Default API URL for production build. Change this to your production domain if necessary.
        - VITE_API_URL=http://localhost:5000/api
    container_name: passport-extractor-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
